<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trigon Cyber Defense Terminal</title>
  <link rel="stylesheet" href="terminal.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="cyber-bg">
    <div class="cyber-grid"></div>
    <div class="data-streams"></div>
    <div class="radar-pulse"></div>
    <div class="cyber-dragon" aria-hidden="true">
      <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dragonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15" />
            <stop offset="50%" style="stop-color:#0088ff;stop-opacity:0.12" />
            <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:0.1" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <g fill="none" stroke="url(#dragonGlow)" stroke-width="0.8" opacity="0.5" class="dragon-paths">
          <path class="dragon-line" d="M 120 280 L 180 260 L 220 240 L 260 220 L 300 200 L 340 190 L 380 185 L 420 180 L 460 175 L 500 170 L 540 165 L 580 160 L 620 155 L 660 150" />
          <path class="dragon-line" d="M 100 300 L 160 290 L 200 280 L 240 270 L 280 260 L 320 250 L 360 245 L 400 240 L 440 238 L 480 235 L 520 232 L 560 230 L 600 228" />
          <path class="dragon-line" d="M 80 320 L 140 310 L 180 305 L 220 300 L 260 295 L 300 292 L 340 290 L 380 288 L 420 286 L 460 285 L 500 284 L 540 283" />
          <path class="dragon-line" d="M 660 150 L 680 140 L 700 130 L 720 120 L 740 115 L 760 110 L 780 108" />
          <path class="dragon-line" d="M 620 155 L 640 148 L 660 142 L 680 138 L 700 135 L 720 132" />
          <path class="dragon-line" d="M 200 200 L 220 180 L 240 160 L 260 150 L 280 145 L 300 140 L 320 138" />
          <path class="dragon-line" d="M 180 220 L 200 200 L 220 190 L 240 185 L 260 182" />
          <path class="dragon-line" d="M 320 138 L 340 136 L 360 135 L 380 134 L 400 133 L 420 132 L 440 131 L 460 130 L 480 129 L 500 128" />
          <path class="dragon-line" d="M 120 280 L 100 260 L 90 240 L 85 220 L 82 200 L 80 180 L 78 160 L 76 140" />
          <path class="dragon-line" d="M 140 300 L 120 280 L 110 260 L 105 240 L 102 220" />
          <path class="dragon-line" d="M 400 240 L 380 260 L 360 280 L 340 300 L 320 320 L 300 340 L 280 360 L 260 380" />
          <path class="dragon-line" d="M 440 238 L 420 258 L 400 278 L 380 298 L 360 318 L 340 338 L 320 358" />
          <path class="dragon-line" d="M 480 235 L 460 255 L 440 275 L 420 295 L 400 315 L 380 335" />
          <path class="dragon-line" d="M 260 380 L 240 400 L 220 420 L 200 440 L 180 460 L 160 480 L 140 500" />
          <path class="dragon-line" d="M 320 358 L 300 378 L 280 398 L 260 418 L 240 438 L 220 458" />
          <path class="dragon-line" d="M 500 284 L 520 282 L 540 280 L 560 278 L 580 276 L 600 274 L 620 272 L 640 270 L 660 268" />
          <path class="dragon-line" d="M 660 268 L 680 266 L 700 264 L 720 262 L 740 260 L 760 258 L 780 256" />
        </g>
      </svg>
    </div>
  </div>

  <main class="terminal-container">
    <header class="terminal-header">
      <span class="terminal-title">TRIGON CYBER DEFENSE TERMINAL</span>
      <span class="terminal-status">SECURE CONNECTION</span>
    </header>

    <section class="terminal-window">
      <div id="boot-output" class="terminal-output"></div>
      <div id="command-output" class="terminal-output"></div>
      <div class="terminal-input-line">
        <span class="prompt">cyberos@trigon:~$</span>
        <input type="text" id="terminal-input" class="terminal-input" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <span id="cursor" class="cursor">▌</span>
        <span id="autocomplete-hint" class="autocomplete-hint"></span>
      </div>
    </section>

    <section class="command-shortcuts">
      <h2 class="shortcuts-title">AVAILABLE COMMANDS</h2>
      <div id="command-buttons" class="command-buttons"></div>
    </section>
  </main>

  <div id="dashboard-overlay" class="overlay hidden">
    <div class="dashboard-panel">
      <button id="dashboard-close" class="close-btn" aria-label="Close dashboard">×</button>
      <div id="dashboard-content"></div>
    </div>
  </div>

  <div id="contact-overlay" class="overlay hidden">
    <div class="contact-panel">
      <button id="contact-close" class="close-btn" aria-label="Close contact">×</button>
      <h2>Contact Trigon</h2>
      <form id="contact-form">
        <label>Name <input type="text" name="name" required /></label>
        <label>Email <input type="email" name="email" required /></label>
        <label>Message <textarea name="message" rows="4" required></textarea></label>
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script type="module" src="terminal.js"></script>
</body>
</html>
